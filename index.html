<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Chat App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.55.0/build/stlite.css" />
    <style>
        /* Optimisation pour éviter les marges blanches sur mobile */
        body, html { margin: 0; padding: 0; overflow: hidden; }
        #root { height: 100vh; width: 100vw; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.55.0/build/stlite.js"></script>
    <script>
        stlite.mount({
            requirements: [], // Ajoute tes libs ici (ex: ["openai"])
            entrypoint: "main.py",
            files: {
                // On demande au chargeur d'aller lire ton fichier main.py réel
                "main.py": {
                    url: "./main.py"
                }
            },
            // Configuration pour rendre l'UI plus "App" et moins "Site web"
            streamlitConfig: {
                "server.headless": true,
                "theme.primaryColor": "#FF4B4B",
                "theme.base": "dark"
            }
        }, document.getElementById("root"));
    </script>
</body>
</html>
