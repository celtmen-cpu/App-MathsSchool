<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathApp</title>

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007BFF">

<!-- Favicon et Apple touch icon -->
<link rel="icon" href="Icon app maths.jpg" sizes="512x512" type="image/jpeg">
<link rel="apple-touch-icon" href="Icon app maths.jpg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
    background-color: #f5f5f5;
}

.tabs {
    display: flex;
    cursor: pointer;
    margin-bottom: 10px;
}

.tab {
    padding: 10px 20px;
    background: #ddd;
    margin-right: 2px;
    border-radius: 5px 5px 0 0;
    transition: background 0.3s;
}

.tab.active {
    background: #fff;
    font-weight: bold;
    border-bottom: 2px solid #fff;
}

.tab-content {
    background: #fff;
    padding: 20px;
    border-radius: 0 5px 5px 5px;
    display: none;
}

.tab-content.active {
    display: block;
}
</style>
</head>
<body>

<h1>Exemple TabView</h1>

<div class="tabs">
    <div class="tab active" data-tab="1">Onglet 1</div>
    <div class="tab" data-tab="2">Onglet 2</div>
    <div class="tab" data-tab="3">Onglet 3</div>
</div>

<div class="tab-content active" id="tab-1">
    <p>Contenu de l'onglet 1.</p>
</div>
<div class="tab-content" id="tab-2">
    <p>Contenu de l'onglet 2.</p>
</div>
<div class="tab-content" id="tab-3">
    <p>Contenu de l'onglet 3.</p>
</div>

<script>
const tabs = document.querySelectorAll('.tab');
const contents = document.querySelectorAll('.tab-content');

tabs.forEach(tab => {
    tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        contents.forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
});

// Service worker pour PWA
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
    .then(() => console.log('Service Worker enregistré'));
}
</script>

</body>
</html>
