<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathSchool</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="chat-container">
    <header class="chat-header">MathSchool</header>
    <main id="chat-box" class="chat-box"></main>
    <div class="chat-input-area">
        <input type="text" id="message" placeholder="Pose ta question de maths..." autofocus>
        <button id="send-btn">Envoyer</button>
    </div>
</div>

<script>
const input = document.getElementById("message");
const button = document.getElementById("send-btn");
const chatBox = document.getElementById("chat-box");

function addMessage(sender, text){
    const div = document.createElement("div");
    div.classList.add("message", sender);
    div.textContent = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage(){
    const msg = input.value.trim();
    if(!msg) return;
    addMessage("user", msg);
    input.value = "";

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({message: msg})
    });

    const data = await res.json();
    addMessage("bot", data.response);
}

button.addEventListener("click", sendMessage);
input.addEventListener("keypress", (e) => {if(e.key==="Enter") sendMessage();});

window.onload = () => {
    addMessage("bot", "Bienvenue sur MathSchool ! Pose une question de maths.");
};
</script>
</body>
</html>
